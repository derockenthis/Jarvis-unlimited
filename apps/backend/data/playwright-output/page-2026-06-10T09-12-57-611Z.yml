                - generic [ref=e486]:
                  - heading "Agent Skills" [level=2] [ref=e487]
                  - 'link "Permalink: Agent Skills" [ref=e488] [cursor=pointer]':
                    - /url: "#agent-skills"
                    - img [ref=e489]
                - paragraph [ref=e491]: Large Language Models (LLMs) and generative AI coding assistants are often trained on static datasets. As a result, they may be unaware of recent updates and suggest outdated or legacy libraries.
