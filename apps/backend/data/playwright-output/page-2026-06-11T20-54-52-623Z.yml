            - heading "Graph-based agent workflows ¶" [level=1] [ref=e753]:
              - text: Graph-based agent workflows
              - link "¶" [ref=e754] [cursor=pointer]:
                - /url: https://adk.dev/graphs/#graph-based-agent-workflows
            - generic [ref=e755]:
              - generic [ref=e756]: Supported in ADK
              - generic [ref=e757]: Python v2.0.0
            - paragraph [ref=e758]: Graph-based agent workflows in ADK let you build agents with more precise control, creating deterministic processes that combine code logic and AI reasoning capabilities. Graph-based workflows allow you to define your agent logic as a graph of execution nodes and edges, combining AI-powered agent reasoning with deterministic tools and code.
            - paragraph [ref=e759]:
              - img "Graph-based flight upgrade agent" [ref=e760]
            - paragraph [ref=e761]:
              - strong [ref=e762]: Figure 1.
              - text: A graph-based agent design for flight upgrades, combining workflow nodes of different types, including Functions, human input, Tools, and LLM capabilities.
            - paragraph [ref=e763]:
              - text: Prebuilt ADK
              - link "template workflows" [ref=e764] [cursor=pointer]:
                - /url: https://adk.dev/agents/workflow-agents/
              - text: ", such as"
              - link "Sequential Agents" [ref=e765] [cursor=pointer]:
                - /url: https://adk.dev/agents/workflow-agents/sequential-agents/
              - text: ", provide a defined process flow control only across a set of agents. You can continue to build standard ADK agents with long prompts, tools, and use them in graph-based workflow agents. When you need more precise control, workflow agent graphs give you more flexibility over how tasks are routed and executed. Graph-based workflows provide the following advantages:"
            - list [ref=e766]:
              - listitem [ref=e767]:
                - strong [ref=e768]: "Define precise logic:"
                - text: Explicitly map out routing logic to manage transitions between different nodes.
              - listitem [ref=e769]:
                - strong [ref=e770]: "Implement complex structures:"
                - text: Build agent workflows that support branching and state management.
              - listitem [ref=e771]:
                - strong [ref=e772]: "Run chains of functions without AI:"
                - text: Call agent tools and your own code without invoking a generative AI model.
              - listitem [ref=e773]:
                - strong [ref=e774]: "Enhance reliability:"
                - text: Improve the predictability of your agents by relying on structured node definitions rather than prompts alone.
            - heading "Get started ¶" [level=2] [ref=e775]:
              - text: Get started
              - link "¶" [ref=e776] [cursor=pointer]:
                - /url: https://adk.dev/graphs/#get-started
            - paragraph [ref=e777]: This section describes how to get started with graph-based agents. The following example shows how to create a sequential graph-based agent workflow that generates a city name, looks up the current time in that city with code function, and the final agent reports the information.
            - generic [ref=e779]:
              - navigation [ref=e780]:
                - button "Copy to clipboard" [ref=e781] [cursor=pointer]
              - code [ref=e782]:
                - generic [ref=e783]: from google.adk import Agent
                - generic [ref=e784]: from google.adk import Workflow
                - generic [ref=e785]: from google.adk import Event
                - generic [ref=e786]: from pydantic import BaseModel
                - generic [ref=e788]: city_generator_agent = Agent(
                - generic [ref=e789]: name="city_generator_agent",
                - generic [ref=e790]: model="gemini-flash-latest",
                - generic [ref=e791]: instruction="""Return the name of a random city.
                - generic [ref=e792]: Return only the name, nothing else.""",
                - generic [ref=e793]: output_schema=str,
                - generic [ref=e794]: )
                - generic [ref=e796]: "class CityTime(BaseModel):"
                - generic [ref=e797]: "time_info: str # time information"
                - generic [ref=e798]: "city: str # city name"
                - generic [ref=e800]: "def lookup_time_function(node_input: str):"
                - generic [ref=e801]: "\"\"\"Simulate returning the current time in the specified city.\"\"\""
                - generic [ref=e802]: return CityTime(time_info="10:10 AM", city=node_input)
                - generic [ref=e804]: city_report_agent = Agent(
                - generic [ref=e805]: name="city_report_agent",
                - generic [ref=e806]: model="gemini-flash-latest",
                - generic [ref=e807]: input_schema=CityTime,
                - generic [ref=e808]: "instruction=\"\"\"Output following line:"
                - generic [ref=e809]: "It is {CityTime.time_info} in {CityTime.city} right now.\"\"\","
                - generic [ref=e810]: output_schema=str,
                - generic [ref=e811]: )
                - generic [ref=e813]: "def completed_message_function(node_input: str):"
                - generic [ref=e814]: return Event(
                - generic [ref=e815]: "message=f\"{node_input}\\n WORKFLOW COMPLETED.\","
                - generic [ref=e816]: )
                - generic [ref=e818]: root_agent = Workflow(
                - generic [ref=e819]: name="root_agent",
                - generic [ref=e820]: edges=[
                - generic [ref=e821]: ("START", city_generator_agent, lookup_time_function,
                - generic [ref=e822]: city_report_agent, completed_message_function)
                - generic [ref=e823]: "],"
                - generic [ref=e824]: )
            - paragraph [ref=e825]:
              - text: This sample code demonstrates how you can use the
              - strong [ref=e826]:
                - emphasis [ref=e827]: Workflow
              - text: class to assemble a simple, sequential workflow and alternate between AI agent processing and code execution. While you could perform these steps using a single agent with a longer prompt and a tool call, the graph-based approach gives you precise control over the task execution order and the data output from each step.
            - paragraph [ref=e828]:
              - text: For more information about data handling with graph-based workflows, see
              - link "Data handling with workflow nodes and agents" [ref=e829] [cursor=pointer]:
                - /url: https://adk.dev/graphs/data-handling/
              - text: .
            - heading "Build processes with graphs ¶" [level=2] [ref=e830]:
              - text: Build processes with graphs
              - link "¶" [ref=e831] [cursor=pointer]:
                - /url: https://adk.dev/graphs/#build-processes-with-graphs
            - paragraph [ref=e832]: You can use prompt-based agents to define multiple step processes with descriptions of tasks and procedures using the instructions field of an ADK agent. However, as your instructions and procedures become longer and more complicated, making sure that the agent is following each step and guideline becomes more complicated and less reliable.
            - paragraph [ref=e833]:
              - text: Graph-based workflow agents provide a significant advantage over prompt-based agents by allowing you to specifically define the overall process workflow in code. With graph-based agent workflows, each step of the process can be defined as an execution
              - strong [ref=e834]:
                - emphasis [ref=e835]: Node
              - text: "in a graph and each node can be an AI agent, Tool, or your programmed code. The following diagram illustrates how a simple prompt-based agent would translate into a workflow agent graph:"
            - paragraph [ref=e836]:
              - img "Prompt-based agent to graph-based workflow" [ref=e837]
            - paragraph [ref=e838]:
              - strong [ref=e839]: Figure 2.
              - text: Structure of prompt-based agent instructions translated into a graph-based workflow.
            - paragraph [ref=e840]: Moving from prompt-based agents to graph-based workflow agents allows you to explicitly break out the tasks of a procedure to define a specific execution flow. Once defined, the agent application flows the steps in the graph, switching between non-deterministic AI-powered agents and deterministic code as needed.
            - paragraph [ref=e841]:
              - text: The following code sample shows how the workflow graph in Figure 2 could be translated into a graph-based agent using the
              - strong [ref=e842]:
                - emphasis [ref=e843]: Workflow
              - text: "class:"
            - generic [ref=e845]:
              - navigation [ref=e846]:
                - button "Copy to clipboard" [ref=e847] [cursor=pointer]
              - code [ref=e848]:
                - generic [ref=e849]: process_message = Agent(
                - generic [ref=e850]: name="process_message",
                - generic [ref=e851]: model="gemini-flash-latest",
                - generic [ref=e852]: instruction="""Classify user message into either "BUG", "CUSTOMER_SUPPORT",
                - generic [ref=e853]: or "LOGISTICS". If you think a message applies to more than one category,
                - generic [ref=e854]: reply with a comma separated list of categories.
                - generic [ref=e855]: "\"\"\","
                - generic [ref=e856]: output_schema=str,
                - generic [ref=e857]: )
                - generic [ref=e859]: "def router(node_input: str):"
                - generic [ref=e860]: routes = node_input.split(",")
                - generic [ref=e861]: routes = [route.strip() for route in routes]
                - generic [ref=e862]: return Event(route=routes)
                - generic [ref=e864]: "def response_1_bug():"
                - generic [ref=e865]: return Event(message="Handling bug...")
                - generic [ref=e867]: "def response_2_support():"
                - generic [ref=e868]: return Event(message="Handling customer support...")
                - generic [ref=e870]: "def response_3_logistics():"
                - generic [ref=e871]: return Event(message="Handling logistics...")
                - generic [ref=e873]: root_agent = Workflow(
                - generic [ref=e874]: name="routing_workflow",
                - generic [ref=e875]: edges=[
                - generic [ref=e876]: ("START", process_message, router),
                - generic [ref=e877]: ( router,
                - generic [ref=e878]: "{"
                - generic [ref=e879]: "\"BUG\": response_1_bug,"
                - generic [ref=e880]: "\"CUSTOMER_SUPPORT\": response_2_support,"
                - generic [ref=e881]: "\"LOGISTICS\": response_3_logistics,"
                - generic [ref=e882]: "}"
                - generic [ref=e883]: )
                - generic [ref=e884]: "],"
                - generic [ref=e885]: )
            - paragraph [ref=e886]:
              - text: This sample code demonstrates how you can use an
              - strong [ref=e887]:
                - emphasis [ref=e888]: edges
              - text: array to define a graph with routes between a set of
              - emphasis [ref=e889]: nodes
              - text: ", which are discrete tasks that can include agents, Tools, your code, and even additional"
              - strong [ref=e890]:
                - emphasis [ref=e891]: Workflows
              - text: . For information about building advanced graphs for workflows, see
              - link "Build graph routes for workflow agents" [ref=e892] [cursor=pointer]:
                - /url: https://adk.dev/graphs/routes/
              - text: .
            - heading "Known limitations ¶" [level=2] [ref=e893]:
              - text: Known limitations
              - link "¶" [ref=e894] [cursor=pointer]:
                - /url: https://adk.dev/graphs/#known-limitations
            - paragraph [ref=e895]:
              - text: There are some known limitations with graph-based workflows. They are
              - emphasis [ref=e896]: not compatible
              - text: "with the following ADK features:"
            - list [ref=e897]:
              - listitem [ref=e898]:
                - strong [ref=e899]: Live Streaming
                - text: functionality is not compatible with graph-based workflows.
              - listitem [ref=e900]:
                - strong [ref=e901]: "Integrations:"
                - text: Some third-party
                - link "Integrations" [ref=e902] [cursor=pointer]:
                  - /url: https://adk.dev/integrations/
                - text: may not be compatible with graph-based workflows.
