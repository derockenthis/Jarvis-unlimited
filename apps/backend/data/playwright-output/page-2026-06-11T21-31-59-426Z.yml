            - heading "Understand Skills ¶" [level=2] [ref=e838]:
              - text: Understand Skills
              - link "¶" [ref=e839] [cursor=pointer]:
                - /url: https://adk.dev/skills/#understand-skills
            - paragraph [ref=e840]: "The Skills feature allows you to create modular packages of Skill instructions and resources that agents can load on demand. This approach helps you organize your agent's capabilities and optimize the context window by only loading instructions when they are needed. The structure of Skills is organized into three levels:"
            - list [ref=e841]:
              - listitem [ref=e842]:
                - strong [ref=e843]: "L1 (Metadata):"
                - text: Provides metadata for skill discovery. This information is defined in the frontmatter section of the
                - code [ref=e844]: SKILL.md
                - text: file and includes properties such as the Skill name and description.
              - listitem [ref=e845]:
                - strong [ref=e846]: "L2 (Instructions):"
                - text: Contains the primary instructions for the Skill, loaded when the Skill is triggered by the agent. This information is defined in the body of the
                - code [ref=e847]: SKILL.md
                - text: file.
              - listitem [ref=e848]:
                - strong [ref=e849]: "L3 (Resources):"
                - text: "Includes additional resources such as reference materials, assets, and scripts that can be loaded as needed. These resources are organized into the following directories:"
                - list [ref=e850]:
                  - listitem [ref=e851]:
                    - code [ref=e852]: references/
                    - text: ": Additional Markdown files with extended instructions, workflows, or guidance."
                  - listitem [ref=e853]:
                    - code [ref=e854]: assets/
                    - text: ": Resource materials such as database schemas, API documentation, templates, or examples."
                  - listitem [ref=e855]:
                    - code [ref=e856]: scripts/
                    - text: ": Executable scripts supported by the agent runtime."
            - heading "Skills directory structure ¶" [level=3] [ref=e857]:
              - text: Skills directory structure
              - link "¶" [ref=e858] [cursor=pointer]:
                - /url: https://adk.dev/skills/#skills-directory-structure
            - paragraph [ref=e859]:
