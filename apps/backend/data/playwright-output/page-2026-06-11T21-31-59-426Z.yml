              - code [ref=e860]: example-skill/
              - text: directory shown below, and any parallel Skill directories, must follow the
              - link "Agent Skill specification" [ref=e861] [cursor=pointer]:
                - /url: https://agentskills.io/specification
              - text: file structure. Only the
              - code [ref=e862]: SKILL.md
              - text: file is required.
